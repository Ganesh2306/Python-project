- hosts: web
  become: yes

  tasks:

  - name: Install Docker
    apt:
      name: docker.io
      state: present
      update_cache: yes

  - name: Start Docker
    service:
      name: docker
      state: started
      enabled: yes

  - name: Pull Docker Image
    command: docker pull ganesh2306/python-devops

  - name: Run Docker Container
    command: docker run -d -p 5000:5000 ganesh2306/python-devops
    
