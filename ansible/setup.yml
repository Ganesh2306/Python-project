- hosts: web
  become: yes

  tasks:

  - name: Install Docker
    apt:
      name: docker.io
      state: present
      update_cache: yes

  - name: Start Docker
    service:
      name: docker
      state: started
      enabled: yes

  - name: Pull Docker Image
    command: docker pull python-devops

  - name: Run Container
    command: docker run -d -p 80:5000 --name python-app python-devops
    